<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منظومة همس الخير - تحت التطوير</title>
    <style>
        /* إعدادات الخلفية السوداء */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden; /* لمنع التمرير */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* كود خلفية الأكواد المتحركة */
        canvas {
            display: block;
        }

        /* حاوية الرسالة */
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid silver;
            border-radius: 20px;
            box-shadow: 0 0 30px silver;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px silver;
        }

        p {
            color: silver;
            font-size: 1.5rem;
            margin-top: 0;
        }

        .status {
            color: #28a745;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="overlay">
        <h1>🦅 منظومة همس الخير</h1>
        <p>نحن تحت التطوير الآن...</p>
        <p class="status">جاري تحديث قاعدة البيانات وتثبيت المهمات 🛡️</p>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789HAMS_KHAIR";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            // خلفية سوداء شفافة عشان تعمل تأثير "الذيل" للأكواد
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#c0c0c0"; // لون سيلفر (لون المنظومة)
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        // ضبط المقاس لو المتصفح اتغير حجمه
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
